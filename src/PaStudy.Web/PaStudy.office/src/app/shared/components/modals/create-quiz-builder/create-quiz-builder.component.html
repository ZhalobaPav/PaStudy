<div class="modal-card scrollable">
  <div class="modal-header">
    <h2>Створення тесту</h2>
    <button class="close-icon" (click)="close()">×</button>
  </div>
  <form [formGroup]="quizForm">
    <div class="modal-body">
      <div class="form-group">
        <label for="title">Назва тесту</label>
        <pa-input
          formControlName="title"
          type="text"
          placeholder="Введіть ім'я"
        />
      </div>

      <div class="form-group">
        <label for="title">Введіть кількість балів</label>
        <pa-input
          type="number"
          placeholder="Введіть кількість балів"
          formControlName="points"
        />
      </div>

      <div class="form-group">
        <label for="title">Введіть обмеження в часі</label>
        <pa-input
          type="number"
          placeholder="Введіть кількість хвилин"
          formControlName="timeLimitMinutes"
        />
      </div>
      <div class="form-group">
        <label for="dueDate">Дата</label>
        <input id="dueDate" formControlName="dueDate" rows="3" type="date" />
      </div>
      <div class="questions-list" formArrayName="questions">
        @for (qGroup of questions.controls; track $index) {
          <app-quiz-question
            [questionForm]="asFormGroup(qGroup)"
            [index]="$index"
            (remove)="removeQuestion($index)"
          />
        }
      </div>
      <div class="button-wrapper">
        <div class="split-button-container">
          <button class="main-button" (click)="addQuestion()">
            {{ buttonLabel() }}
          </button>

          <button class="arrow-button" [matMenuTriggerFor]="menu">
            <span class="arrow-down"></span>
          </button>

          <mat-menu #menu="matMenu">
            <button
              mat-menu-item
              (click)="selectType(QuestionType.SingleChoice)"
            >
              {{ buttonLabelNames.singleChoice }}
            </button>
            <button mat-menu-item (click)="selectType(QuestionType.Matching)">
              {{ buttonLabelNames.matchingChoice }}
            </button>
          </mat-menu>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="close()">
          Скасувати
        </button>
        <button
          type="submit"
          class="btn-primary"
          (click)="onSubmit()"
          [disabled]="quizForm.invalid || isLoading()"
        >
          @if (isLoading()) {
            <span>Завантаження...</span>
          } @else {
            <span>Створити тест</span>
          }
        </button>
      </div>
    </div>
  </form>
</div>
