<div class="page-header-inner">
  <h1 class="page-header-title">
    {{ title }} <small>{{ subtitle }}</small>
  </h1>
  @if (!hideBreadcrumb) {
    <app-breadcrumb />
  }
  <div class="courses-link"><a routerLink="courses">Courses</a></div>
  @if (isAuthenticated) {
    <div class="logout"><button (click)="logout()">Logout</button></div>
  }
</div>
