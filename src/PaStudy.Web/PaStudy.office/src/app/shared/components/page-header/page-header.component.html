<div class="page-header-inner">
  <h1 class="page-header-title">
    {{ title }} <small>{{ subtitle }}</small>
  </h1>
  <nav class="back-navigation">
    <button class="back-link" (click)="goBackToCourse()">
      <span class="arrow">←</span>
    </button>
  </nav>
  @if (!hideBreadcrumb) {
    <app-breadcrumb />
  }
  <div class="courses-link"><a routerLink="courses">Courses</a></div>
  @if (isAuthenticated) {
    <div class="logout"><button (click)="logout()">Logout</button></div>
  }
  <div class="notification-container">
    <div class="notification-bell" (click)="toggleDropdown()">
      🔔
      @if (unreadCount() > 0) {
        <span class="badge">{{ unreadCount() }}</span>
      }
    </div>

    @if (isDropdownOpen()) {
      <div class="notifications-dropdown">
        @for (notif of notifications(); track notif.id) {
          <div
            class="notif-item"
            [class.unread]="!notif.isRead"
            (click)="readNotif(notif)"
          >
            <h4>{{ notif.title }}</h4>
            <p>{{ notif.message }}</p>
          </div>
        } @empty {
          <p class="empty">📭 Сповіщень немає</p>
        }
      </div>
    }
  </div>
</div>
