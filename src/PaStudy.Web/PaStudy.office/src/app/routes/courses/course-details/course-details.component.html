<div class="container">
  <div class="header-navigation">
    <ul class="header-navigation">
      @if (course()?.isEnrolled || course()?.isTeaching) {
        @for (header of headerConfig; track $index) {
          <li
            class="header-elem"
            [class.active]="activeTab() === header.title"
            (click)="setTab(header.title)"
          >
            <a>
              {{ header.title }}
            </a>
          </li>
        }
      }
      @if (isTeacher) {
        <div class="edit-checkbox">
          <span class="edit-title">Edit mode</span>
          <input type="checkbox" [(ngModel)]="isEditMode" />
        </div>
      }
    </ul>
  </div>
  @switch (activeTab()) {
    @case (tab.Students) {
      <app-course-students></app-course-students>
    }
    @default {
      <app-course-info
        [course]="course()"
        [isEditMode]="isEditMode"
      ></app-course-info>
    }
  }
  @if (isEnrollAvailable()) {
    <button class="submit-btn" (click)="enrollToCourse()">
      Записатися на курс
    </button>
  }
  <router-outlet></router-outlet>
</div>
