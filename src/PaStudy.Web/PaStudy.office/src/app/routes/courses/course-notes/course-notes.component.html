<app-table
  [rows]="notes()"
  (fetch)="fetchNotes($event)"
  [rowTemplate]="rowTemplate"
  [config]="tableConfig"
>
</app-table>

<ng-template #rowTemplate let-row="row">
  <p [routerLink]="['assignment', row.assignmentInfo.id]">
    {{ row.assignmentInfo.name }}
  </p>
  <span>{{ row.grade }}</span>
  <span>{{ row.assignmentInfo.maxPoints }}</span>
  <span>{{ row.percentage }} %</span>
</ng-template>
