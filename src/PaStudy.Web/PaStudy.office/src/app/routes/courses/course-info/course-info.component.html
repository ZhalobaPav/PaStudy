<div class="title">
  <h1>{{ course()?.title }}</h1>
</div>
<div class="description">
  <p>{{ course()?.description }}</p>
</div>
@if (course() && (course()?.isEnrolled || course()?.isTeaching)) {
  <app-assignment-list
    [course]="course()"
    [isEditMode]="isEditMode()"
  ></app-assignment-list>
}
