name: Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: europe-west4-docker.pkg.dev
  PROJECT: loyal-curve-498920-t5
  REPO: pastudy-repo

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: europe-west4-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push backend
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.REPO }}/pastudy_backend:latest \
            -f src/PavStudy.API/Dockerfile src/
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.REPO }}/pastudy_backend:latest

      - name: Build and push frontend
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.REPO }}/pastudy_frontend:latest \
            src/PaStudy.Web/PaStudy.office
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.REPO }}/pastudy_frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ВИПРАВЛЕНО: Надійний запис багаторядкового SSH-ключа
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat << EOF > ~/.ssh/id_rsa
          ${{ secrets.DEPLOY_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Create Docker context
        run: |
          docker context create remote --docker host=ssh://${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }}

      - name: Deploy via Docker Context
        run: |
          export DB_PASSWORD="${{ secrets.MSSQL_SA_PASSWORD }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET_KEY }}"
          export ISSUER="${{ secrets.ISSUER }}"
          export AUDIENCE="${{ secrets.AUDIENCE }}"
          export CLOUDNAME="${{ secrets.CLOUDNAME }}"
          export APIKEY="${{ secrets.APIKEY }}"
          export APISECRET="${{ secrets.APISECRET }}"
          export DOCKER_CONTEXT="remote"

          docker compose -f src/docker-compose.yml up -d --pull always --remove-orphans

      - name: Cleanup
        if: always()
        run: rm -rf ~/.ssh
